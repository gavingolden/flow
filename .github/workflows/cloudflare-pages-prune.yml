# Reusable workflow: bulk-prune Cloudflare Pages deployments.
#
# Consumers call this via `uses: gavingolden/flow/.github/workflows/cloudflare-pages-prune.yml@<sha>`.
# The SHA in `uses:` pins both the workflow contract AND the prune script —
# the workflow resolves its own revision from `github.workflow_ref`, which
# has the shape `<owner>/<repo>/.github/workflows/<name>.yml@<ref>` where
# `<ref>` is the resolved SHA when the caller pinned via `@<sha>`. The
# `Resolve flow SHA from workflow_ref` step extracts that suffix and feeds
# it to `actions/checkout`, so the workflow checks out its own revision
# (not the caller's commit SHA) without any caller-side changes.
#
# Cross-repo-private limitation: when the caller is a *different private repo*
# than gavingolden/flow, the default GITHUB_TOKEN cannot fetch the sibling
# private repo's source — pass the optional WORKFLOW_REPO_TOKEN secret
# (fine-grained PAT or GitHub App installation token with Contents:Read on
# gavingolden/flow) to resolve.
#
# Consumer-side example: skills/stacks/cloudflare-pages/SKILL.md section 1.

name: cloudflare-pages-prune

on:
  workflow_call:
    inputs:
      project:
        description: Cloudflare Pages project name (required).
        type: string
        required: true
      older_than_days:
        description: Delete deployments older than this many days (required).
        type: number
        required: true
      branch:
        description: >-
          Optional branch glob passed to the script's --branch flag. Supports
          positive (e.g. 'feat/*') or negative ('!main') globs. Empty string
          (default) omits --branch entirely so the script matches all branches.
        type: string
        required: false
        default: ''
      dry_run:
        description: >-
          When true (default), invokes the script with --dry-run and only
          prints the would-delete list. When false, invokes with --apply and
          performs the deletes. Defaulting to true is the fail-safe — a
          caller that forgets the input gets a no-op log instead of an
          accidental mass-deletion.
        type: boolean
        required: false
        default: true
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: Cloudflare API token with Account.Cloudflare Pages:Edit scope.
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: Cloudflare account ID (not project ID).
        required: true
      WORKFLOW_REPO_TOKEN:
        description: >-
          Optional. Token with `contents: read` on gavingolden/flow. Required
          when the caller is a *different private repo* than gavingolden/flow;
          the default GITHUB_TOKEN is repo-scoped and cannot fetch a sibling
          private repo's source. A fine-grained PAT (or GitHub App installation
          token) scoped to gavingolden/flow with Contents:Read is sufficient.
          Omit (or pass empty) when the caller is a public repo or
          gavingolden/flow itself.
        required: false

permissions:
  contents: read

jobs:
  prune:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Resolve flow SHA from workflow_ref
        id: flow-sha
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          # github.workflow_ref shape:
          #   <owner>/<repo>/.github/workflows/<name>.yml@<ref>
          # When the caller pinned via @<sha>, <ref> is already the resolved
          # SHA. Strip the leading prefix with bash parameter expansion —
          # safe against injection because WORKFLOW_REF is sourced via env
          # (never expanded as a shell metacharacter).
          sha="${WORKFLOW_REF##*@}"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      # Permanent diagnostic: keeps a workflow-summary paper trail of
      # context-resolution inputs so future regressions are easy to triage.
      - name: Print GitHub workflow context
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          RESOLVED_SHA: ${{ steps.flow-sha.outputs.sha }}
        run: |
          set -euo pipefail
          {
            echo "### GitHub workflow context"
            echo ""
            echo "- github.workflow_ref: \`${WORKFLOW_REF}\`"
            echo "- github.workflow_sha: \`${WORKFLOW_SHA}\`"
            echo "- steps.flow-sha.outputs.sha: \`${RESOLVED_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout gavingolden/flow at the caller-resolved SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: gavingolden/flow
          ref: ${{ steps.flow-sha.outputs.sha }}
          token: ${{ secrets.WORKFLOW_REPO_TOKEN || github.token }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      - name: Run prune-cf-deployments.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INPUT_PROJECT: ${{ inputs.project }}
          INPUT_OLDER_THAN_DAYS: ${{ inputs.older_than_days }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          # GitHub Actions has no integer-only input type — number accepts
          # floats. The prune script's --older-than parser requires `^\d+d$`,
          # so guard at the workflow boundary to surface a clear error
          # instead of an opaque downstream failure. Exit code 2 matches the
          # script's own CLI/env validation exit.
          if ! [[ "${INPUT_OLDER_THAN_DAYS}" =~ ^[0-9]+$ ]]; then
            echo "error: older_than_days must be a non-negative integer (got '${INPUT_OLDER_THAN_DAYS}')" >&2
            exit 2
          fi
          args=()
          args+=(--project "${INPUT_PROJECT}")
          args+=(--older-than "${INPUT_OLDER_THAN_DAYS}d")
          if [ -n "${INPUT_BRANCH}" ]; then
            args+=(--branch "${INPUT_BRANCH}")
          fi
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          else
            args+=(--apply)
          fi
          bun skills/stacks/cloudflare-pages/templates/prune-cf-deployments.ts "${args[@]}"
