hard:
  must_pass:
    - "npm test"
  must_create:
    - "src/slugify.test.ts"
  must_not_modify:
    - "src/slugify.ts"
    - "package.json"
soft:
  - "The test file imports the slugify function from src/slugify.ts."
  - "At least three distinct test cases are present (a normal string, a casing variant, and an empty/edge case)."
  - "Each test asserts the expected output of slugify, not just that it returned a string."
