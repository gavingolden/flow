hard:
  must_pass:
    - "node --experimental-strip-types bin/cli.ts --version | grep -E '^[0-9]+\\.[0-9]+\\.[0-9]+$'"
    - "node --experimental-strip-types bin/cli.ts --help | grep -- '--help'"
  must_create: []
  must_not_modify:
    - "package.json"
soft:
  - "The --version flag reads the version from package.json (not a hard-coded literal)."
  - "Both --version and -v are accepted as the long and short forms."
  - "A unit test asserts the printed version equals the package.json version."
  - "The --help output is unchanged in shape (still lists every flag, no regression)."
  - "No new runtime dependencies were added to package.json."
